<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MovieStream - Ver Películas Gratis</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: oklch(14.5% 0 0);
      --bg-card: oklch(20.5% 0 0);
      --bg-hover: oklch(26.9% 0 0);
      --fg: oklch(98.5% 0 0);
      --fg-muted: oklch(70.8% 0 0);
      --primary: oklch(92.2% 0 0);
      --primary-fg: oklch(20.5% 0 0);
      --border: oklch(100% 0 0 / 0.1);
      --red: oklch(70.4% 0.191 22.216);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
    }
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 64px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }
    nav .logo { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.5px; }
    nav .logo span { color: var(--red); }
    nav .nav-links { display: flex; gap: 20px; margin-left: 40px; }
    nav .nav-links a { color: var(--fg-muted); text-decoration: none; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: color 0.2s; }
    nav .nav-links a:hover, nav .nav-links a.active { color: var(--fg); }
    nav .search-box { margin-left: auto; display: flex; gap: 8px; }
    nav .search-box input {
      background: var(--bg-hover);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      color: var(--fg);
      font-size: 0.85rem;
      width: 220px;
      outline: none;
      transition: border-color 0.2s;
    }
    nav .search-box input:focus { border-color: var(--fg-muted); }
    nav .search-box input::placeholder { color: var(--fg-muted); }

    .container { padding-top: 80px; padding-bottom: 40px; }

    /* Hero Section */
    .hero {
      position: relative;
      height: 70vh;
      min-height: 400px;
      display: flex;
      align-items: flex-end;
      padding: 48px;
      background-size: cover;
      background-position: center;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, var(--bg) 0%, transparent 50%, rgba(0,0,0,0.6) 100%);
    }
    .hero-content { position: relative; z-index: 1; max-width: 600px; }
    .hero-content h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 12px; line-height: 1.1; }
    .hero-content p { font-size: 0.95rem; color: var(--fg-muted); margin-bottom: 20px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .hero-content .meta { display: flex; gap: 12px; font-size: 0.85rem; color: var(--fg-muted); margin-bottom: 16px; align-items: center; }
    .hero-content .meta .badge { background: var(--bg-hover); padding: 2px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 28px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.95rem;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .btn-primary { background: var(--primary); color: var(--primary-fg); }
    .btn-primary:hover { opacity: 0.9; transform: scale(1.03); }
    .btn-secondary { background: rgba(255,255,255,0.1); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); color: var(--fg); }
    .btn-secondary:hover { background: rgba(255,255,255,0.15); }
    .hero-buttons { display: flex; gap: 10px; }

    /* Section */
    .section { padding: 24px 48px; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .section-header h2 { font-size: 1.3rem; font-weight: 700; }
    .section-header .tabs { display: flex; gap: 4px; background: var(--bg-hover); border-radius: 999px; padding: 3px; }
    .section-header .tabs button {
      background: transparent; border: none; color: var(--fg-muted); padding: 6px 16px;
      border-radius: 999px; font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: all 0.2s;
    }
    .section-header .tabs button.active { background: var(--primary); color: var(--primary-fg); }
    .section-header .tabs button:hover:not(.active) { color: var(--fg); }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
    }
    .card {
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.25s;
      background: var(--bg-card);
      border: 1px solid var(--border);
    }
    .card:hover { transform: translateY(-4px); }
    .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
    .card .card-body { padding: 10px; }
    .card .card-body h3 { font-size: 0.8rem; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card .card-body span { font-size: 0.7rem; color: var(--fg-muted); }
    .card .card-type {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,0.7); padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: 600;
    }
    .card { position: relative; }

    /* Loading */
    .loading { text-align: center; padding: 40px; color: var(--fg-muted); }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--fg); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Modal / Detail */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      z-index: 200; display: flex; align-items: center; justify-content: center;
      padding: 24px; overflow-y: auto;
    }
    .modal {
      background: var(--bg-card);
      border-radius: 16px;
      max-width: 800px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      border: 1px solid var(--border);
    }
    .modal-header {
      position: relative;
      height: 320px;
      background-size: cover;
      background-position: center;
    }
    .modal-header::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to top, var(--bg-card) 0%, transparent 50%);
    }
    .modal-close {
      position: absolute; top: 16px; right: 16px; z-index: 10;
      background: rgba(0,0,0,0.6); border: none; color: white;
      width: 36px; height: 36px; border-radius: 50%;
      font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .modal-header-info {
      position: absolute; bottom: 24px; left: 24px; z-index: 5;
    }
    .modal-header-info h2 { font-size: 1.6rem; font-weight: 700; }
    .modal-header-info .meta { display: flex; gap: 10px; font-size: 0.8rem; color: var(--fg-muted); margin-top: 6px; flex-wrap: wrap; }
    .modal-body { padding: 24px; }
    .modal-body .overview { color: var(--fg-muted); font-size: 0.9rem; line-height: 1.6; margin-bottom: 20px; }
    .modal-body .genres { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .modal-body .genres span { background: var(--bg-hover); padding: 4px 14px; border-radius: 999px; font-size: 0.8rem; }
    .modal-body .cast { font-size: 0.85rem; color: var(--fg-muted); margin-bottom: 20px; }
    .modal-body .cast strong { color: var(--fg); }
    .source-options { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0; }
    .source-btn {
      background: var(--bg-hover); border: 1px solid var(--border); color: var(--fg);
      padding: 8px 18px; border-radius: 999px; font-size: 0.8rem; font-weight: 500; cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .source-btn:hover { border-color: var(--fg-muted); background: rgba(255,255,255,0.06); }
  </style>
</head>
<body>
  <p style="padding:2rem;font-family:system-ui,sans-serif;color:var(--fg);max-width:42rem;line-height:1.5">
    Esta copia HTML está incompleta. El reproductor con selección de fuentes (VidHide, LuluStream, StreamWish, etc.)
    vive en la app React: ejecuta <code style="background:var(--bg-hover);padding:2px 8px;border-radius:6px">npm run dev</code>
    y abre la URL que muestra Vite.
  </p>
</body>
</html>
