<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fetch Movie Genres</title>
<style>
  body { font-family: monospace; background: #111; color: #eee; padding: 24px; }
  #log { white-space: pre; font-size: 13px; height: 400px; overflow-y: auto;
         background: #000; padding: 12px; border-radius: 8px; margin-bottom: 16px; }
  button { padding: 10px 24px; background: #e50914; color: #fff; border: none;
           border-radius: 6px; font-size: 15px; cursor: pointer; margin-right: 8px; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  progress { width: 100%; height: 20px; margin-bottom: 12px; }
</style>
</head>
<body>
<h2>CineHub — Fetch Movie Genres from TMDB</h2>
<progress id="bar" value="0" max="100"></progress>
<div id="log">Presiona "Iniciar" para comenzar...\n</div>
<button id="btn" onclick="start()">Iniciar</button>
<button id="dlBtn" onclick="download()" disabled>Descargar movie_genres.json</button>

<script>
const TOKEN = "eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiJkYzcxOWE5MWVlYjMwNzhiYmE3NDRlZDY3MTdiYTM2YyIsIm5iZiI6MTc3ODc3NzkwMS40NzUwMDAxLCJzdWIiOiI2YTA1ZmYyZGZmYThmNjA0MmRlM2M1YWMiLCJzY29wZXMiOlsiYXBpX3JlYWQiXSwidmVyc2lvbiI6MX0.52dihADs-cdeEJmSCsRUOwUGIwMmkJugLX4VZ0J4mB8";
const BASE = "https://api.themoviedb.org/3";
const HEADERS = { "Authorization": `Bearer ${TOKEN}` };

let result = {};
let logEl = document.getElementById("log");
let bar = document.getElementById("bar");

function log(msg) {
  logEl.textContent += msg + "\n";
  logEl.scrollTop = logEl.scrollHeight;
}

async function tmdbGet(path) {
  try {
    const r = await fetch(BASE + path, { headers: HEADERS });
    return await r.json();
  } catch { return null; }
}

async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function start() {
  document.getElementById("btn").disabled = true;
  log("Cargando catálogo...");

  const catalog = await fetch("/contents_compact.json").then(r => r.json());
  const movies = (catalog.data || []).filter(m => m.type !== "Show");
  log(`Total películas: ${movies.length}`);

  log("Cargando géneros de TMDB...");
  const genreData = await tmdbGet("/genre/movie/list?language=es-MX");
  const genreMap = {};
  (genreData?.genres || []).forEach(g => genreMap[g.id] = g.name);
  log(`Géneros cargados: ${Object.keys(genreMap).length}`);

  let done = 0, failed = 0;
  const start = Date.now();

  for (let i = 0; i < movies.length; i++) {
    const movie = movies[i];
    const mid = String(movie.id);
    if (result[mid] !== undefined) continue;

    const title = encodeURIComponent(movie.title || "");
    const data = await tmdbGet(`/search/movie?query=${title}&language=es-MX&page=1`);
    const hit = data?.results?.[0];

    if (hit?.genre_ids?.length) {
      result[mid] = hit.genre_ids.map(id => ({ id, name: genreMap[id] || String(id) }));
      done++;
    } else {
      result[mid] = [];
      failed++;
    }

    if ((i + 1) % 50 === 0 || i === movies.length - 1) {
      const pct = Math.round((i + 1) / movies.length * 100);
      const elapsed = (Date.now() - start) / 1000;
      const eta = Math.round((movies.length - i - 1) * (elapsed / (i + 1)) / 60);
      bar.value = pct;
      log(`[${pct}%] ${i+1}/${movies.length} — encontradas:${done} sin_resultado:${failed} — ETA ~${eta}min`);
      // Auto-save to localStorage every 200
      if ((i + 1) % 200 === 0) {
        localStorage.setItem("movie_genres_backup", JSON.stringify(result));
      }
    }

    await sleep(260);
  }

  log(`\n¡Listo! ${done} encontradas, ${failed} sin resultado.`);
  log("Presiona 'Descargar' para guardar el archivo.");
  document.getElementById("dlBtn").disabled = false;
}

function download() {
  const blob = new Blob([JSON.stringify(result)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "movie_genres.json";
  a.click();
}

// Restore backup if exists
window.onload = () => {
  const backup = localStorage.getItem("movie_genres_backup");
  if (backup) {
    try {
      result = JSON.parse(backup);
      log(`Backup encontrado: ${Object.keys(result).length} películas ya procesadas. Presiona Iniciar para continuar.`);
    } catch {}
  }
};
</script>
</body>
</html>
